{% extends "admin/base.html" %}

{% block title %}Doctor Profile Settings{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px;">
  <form action="{{ url_for('admin_settings') }}" method="POST">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
      <div>
        <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Doctor Name</label>
        <input type="text" name="name" value="{{ doctor.name }}" required style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none;">
      </div>
      <div>
        <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Specialization / Title</label>
        <input type="text" name="title" value="{{ doctor.title }}" required style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none;">
      </div>
    </div>
    
    <div style="margin-bottom:20px;">
      <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Biography / Description</label>
      <textarea name="description" required rows="6" style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none; font-family:var(--font-body); line-height:1.6;">{{ doctor.description }}</textarea>
    </div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:30px;">
      <div>
        <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Years Experience</label>
        <input type="number" name="experience_years" value="{{ doctor.experience_years }}" required style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none;">
      </div>
      <div>
        <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Happy Patients (Text)</label>
        <input type="text" name="patients_count" value="{{ doctor.patients_count }}" required style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none;">
      </div>
      <div>
        <label style="display:block; font-size:0.85rem; color:var(--muted); margin-bottom:8px;">Treatments Done (Text)</label>
        <input type="text" name="treatments_count" value="{{ doctor.treatments_count }}" required style="width:100%; padding:12px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--white); outline:none;">
      </div>
    </div>
    
    <div style="border-top:1px solid var(--border); padding-top:24px; display:flex; justify-content:flex-end;">
      <button type="submit" class="btn-primary" style="padding:14px 32px;">Save Profile Settings</button>
    </div>
  </form>
</div>
{% endblock %}
